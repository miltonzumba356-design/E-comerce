components:
  schemas:
    BestSeller:
      type: object
      properties:
        product_name:
          type: string
        product__id:
          type: integer
        total_sold:
          type: integer
        total_revenue:
          type: number
          format: double
      required:
      - product__id
      - product_name
      - total_revenue
      - total_sold
    Cart:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
          readOnly: true
        total:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - items
      - total
      - updated_at
    CartItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product:
          type: integer
        product_detail:
          allOf:
          - $ref: '#/components/schemas/Product'
          readOnly: true
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 0
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
      required:
      - id
      - product
      - product_detail
      - subtotal
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
      required:
      - id
      - name
      - slug
    Dashboard:
      type: object
      properties:
        total_products:
          type: integer
        total_orders:
          type: integer
        total_customers:
          type: integer
        total_revenue:
          type: number
          format: double
        pending_orders:
          type: integer
        low_stock_items:
          type: integer
      required:
      - low_stock_items
      - pending_orders
      - total_customers
      - total_orders
      - total_products
      - total_revenue
    Login:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    MonthlyRevenue:
      type: object
      properties:
        month:
          type: string
        revenue:
          type: number
          format: double
        orders:
          type: integer
      required:
      - month
      - orders
      - revenue
    Order:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/OrderStatusEnum'
          readOnly: true
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        shipping_address:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - items
      - shipping_address
      - status
      - total
      - updated_at
      - user
    OrderItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product:
          type: integer
          nullable: true
        product_name:
          type: string
          maxLength: 200
        product_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 0
        subtotal:
          type: string
          readOnly: true
      required:
      - id
      - product_name
      - product_price
      - quantity
      - subtotal
    OrderStatus:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
      required:
      - count
      - status
    OrderStatusEnum:
      enum:
      - pending
      - confirmed
      - shipped
      - delivered
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `confirmed` - Confirmed
        * `shipped` - Shipped
        * `delivered` - Delivered
        * `cancelled` - Cancelled
    PaginatedBestSellerList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123

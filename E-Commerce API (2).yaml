openapi: 3.0.3
info:
  title: E-Commerce API
  version: 1.0.0
  description: API completa de e-commerce com RBAC, JWT, carrinho, pedidos e pagamentos
    simulados.
paths:
  /api/auth/:
    post:
      operationId: api_auth_create
      description: Cria uma nova conta de usuário com os dados fornecidos.
      summary: Registrar novo usuário
      tags:
      - Autenticação
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/admin/users/:
    get:
      operationId: api_auth_admin_users_list
      description: Retorna uma lista paginada de todos os usuários (apenas para administradores).
      summary: Listar usuários
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - Administração
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserList'
          description: ''
  /api/auth/admin/users/{id}/:
    get:
      operationId: api_auth_admin_users_retrieve
      description: Retorna os detalhes de um usuário específico.
      summary: Obter detalhes do usuário
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Administração
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/admin/users/{id}/change-role/:
    patch:
      operationId: api_auth_admin_users_change_role_partial_update
      description: Altera a função/permissão de um usuário específico (apenas para
        administradores).
      summary: Alterar função do usuário
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Administração
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/login/:
    post:
      operationId: api_auth_login_create
      description: Autentica o usuário com credenciais (email/senha) e retorna os
        tokens JWT.
      summary: Autenticar usuário
      tags:
      - Autenticação
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Login'
          description: ''
  /api/auth/me/:
    get:
      operationId: api_auth_me_retrieve
      description: Retorna os dados do usuário atualmente autenticado.
      summary: Obter dados do usuário logado
      tags:
      - Autenticação
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/me_update/:
    patch:
      operationId: api_auth_me_update_partial_update
      description: Atualiza parcialmente os dados do usuário autenticado.
      summary: Atualizar dados do usuário logado
      tags:
      - Autenticação
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/refresh/:
    post:
      operationId: api_auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/auth/register/:
    post:
      operationId: api_auth_register_create
      description: Cria uma nova conta de usuário e retorna os tokens de acesso.
      summary: Registrar novo usuário
      tags:
      - Autenticação
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
  /api/cart/:
    get:
      operationId: api_cart_list
      description: Retorna o carrinho atual do usuário autenticado com todos os itens.
      summary: Visualizar carrinho
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - Carrinho
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCartList'
          description: ''
  /api/cart/{id}/remove/:
    delete:
      operationId: api_cart_remove_destroy
      description: Remove um item específico do carrinho do usuário.
      summary: Remover item do carrinho
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Carrinho
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/cart/{id}/update_quantity/:
    patch:
      operationId: api_cart_update_quantity_partial_update
      description: Atualiza a quantidade de um item específico no carrinho.
      summary: Atualizar quantidade do item
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Carrinho
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
  /api/cart/add/:
    post:
      operationId: api_cart_add_create
      description: Adiciona um produto ao carrinho do usuário com a quantidade especificada.
      summary: Adicionar item ao carrinho
      tags:
      - Carrinho
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
  /api/cart/clear/:
    delete:
      operationId: api_cart_clear_destroy
      description: Remove todos os itens do carrinho do usuário autenticado.
      summary: Limpar carrinho
      tags:
      - Carrinho
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/inventory/:
    get:
      operationId: api_inventory_list
      description: Retorna uma lista paginada de todos os registros de estoque.
      summary: Listar estoque
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - Estoque
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedStockList'
          description: ''
  /api/inventory/{id}/:
    get:
      operationId: api_inventory_retrieve
      description: Retorna os detalhes de um registro de estoque específico.
      summary: Obter detalhes do estoque
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this stock.
        required: true
      tags:
      - Estoque
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stock'
          description: ''
  /api/inventory/{id}/adjust/:
    patch:
      operationId: api_inventory_adjust_partial_update
      description: Ajusta a quantidade em estoque de um produto específico.
      summary: Ajustar quantidade do estoque
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this stock.
        required: true
      tags:
      - Estoque
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedStockRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedStockRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedStockRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stock'
          description: ''
  /api/inventory/low_stock/:
    get:
      operationId: api_inventory_low_stock_retrieve
      description: Retorna uma lista paginada de produtos cuja quantidade está abaixo
        do limite mínimo definido.
      summary: Listar produtos com estoque baixo
      tags:
      - Estoque
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stock'
          description: ''
  /api/orders/:
    get:
      operationId: api_orders_list
      description: Retorna uma lista paginada de pedidos do usuário ou todos os pedidos
        para administradores.
      summary: Listar pedidos
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - Pedidos
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrderList'
          description: ''
    post:
      operationId: api_orders_create
      description: Cria um novo pedido a partir dos itens do carrinho do usuário.
      summary: Criar novo pedido
      tags:
      - Pedidos
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            examples:
              Exemplo:
                value:
                  shipping_address: Rua ABC, 123
                  postal_code: 01001-SP
                  payment_method: pix
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              examples:
                Exemplo:
                  value:
                    shipping_address: Rua ABC, 123
                    postal_code: 01001-SP
                    payment_method: pix
          description: ''
  /api/orders/{id}/:
    get:
      operationId: api_orders_retrieve
      description: Retorna os detalhes de um pedido específico.
      summary: Obter detalhes do pedido
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Pedidos
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
          description: ''
  /api/orders/{id}/cancel/:
    post:
      operationId: api_orders_cancel_create
      description: Cancela um pedido existente desde que o status atual permita o
        cancelamento.
      summary: Cancelar pedido
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Pedidos
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrderRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrderRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
          description: ''
  /api/orders/{id}/delivery/:
    get:
      operationId: api_orders_delivery_retrieve
      description: Retorna as informacoes de entrega de um pedido.
      summary: Entrega do pedido
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Pedidos
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
          description: ''
  /api/orders/{id}/status/:
    patch:
      operationId: api_orders_status_partial_update
      description: Atualiza o status de um pedido (apenas para administradores).
      summary: Atualizar status do pedido
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Pedidos
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedOrderRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedOrderRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedOrderRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
          description: ''
  /api/orders/delivery-check/:
    get:
      operationId: api_orders_delivery_check_retrieve
      description: Check if a product can be delivered to a postal code region.
      summary: Check delivery availability
      tags:
      - Pedidos
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                RequestExample:
                  value:
                    product_id: 1
                    postal_code: 01001-SP
                    quantity: 2
                  summary: Request example
                SuccessResponse:
                  value:
                    available: true
                    product_id: 1
                    postal_code: 01001-SP
                    region: São Paulo
                    estimated_days: 3
                    estimated_date: '2026-07-01'
                    shipping_cost: 15.0
                    quantity: 2
                  summary: Success response
          description: Delivery info
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ErrorResponse:
                  value:
                    error: product_id and postal_code are required
                  summary: Error response
          description: Missing required fields
    post:
      operationId: api_orders_delivery_check_create
      description: Check if a product can be delivered to a postal code region.
      summary: Check delivery availability
      tags:
      - Pedidos
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
            examples:
              RequestExample:
                value:
                  product_id: 1
                  postal_code: 01001-SP
                  quantity: 2
                summary: Request example
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                RequestExample:
                  value:
                    product_id: 1
                    postal_code: 01001-SP
                    quantity: 2
                  summary: Request example
                SuccessResponse:
                  value:
                    available: true
                    product_id: 1
                    postal_code: 01001-SP
                    region: São Paulo
                    estimated_days: 3
                    estimated_date: '2026-07-01'
                    shipping_cost: 15.0
                    quantity: 2
                  summary: Success response
          description: Delivery info
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ErrorResponse:
                  value:
                    error: product_id and postal_code are required
                  summary: Error response
          description: Missing required fields
  /api/orders/delivery-check/{id}/:
    get:
      operationId: api_orders_delivery_check_retrieve_2
      description: Check if a product can be delivered to a postal code region.
      summary: Check delivery availability
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Pedidos
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                RequestExample:
                  value:
                    product_id: 1
                    postal_code: 01001-SP
                    quantity: 2
                  summary: Request example
                SuccessResponse:
                  value:
                    available: true
                    product_id: 1
                    postal_code: 01001-SP
                    region: São Paulo
                    estimated_days: 3
                    estimated_date: '2026-07-01'
                    shipping_cost: 15.0
                    quantity: 2
                  summary: Success response
          description: Delivery info
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ErrorResponse:
                  value:
                    error: product_id and postal_code are required
                  summary: Error response
          description: Missing required fields
    post:
      operationId: api_orders_delivery_check_create_2
      description: Check if a product can be delivered to a postal code region.
      summary: Check delivery availability
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Pedidos
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
            examples:
              RequestExample:
                value:
                  product_id: 1
                  postal_code: 01001-SP
                  quantity: 2
                summary: Request example
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                RequestExample:
                  value:
                    product_id: 1
                    postal_code: 01001-SP
                    quantity: 2
                  summary: Request example
                SuccessResponse:
                  value:
                    available: true
                    product_id: 1
                    postal_code: 01001-SP
                    region: São Paulo
                    estimated_days: 3
                    estimated_date: '2026-07-01'
                    shipping_cost: 15.0
                    quantity: 2
                  summary: Success response
          description: Delivery info
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ErrorResponse:
                  value:
                    error: product_id and postal_code are required
                  summary: Error response
          description: Missing required fields
  /api/payments/{id}/refund/:
    post:
      operationId: api_payments_refund_create
      description: Solicita o reembolso de um pagamento existente (apenas para administradores).
      summary: Reembolsar pagamento
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this payment.
        required: true
      tags:
      - Pagamentos
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
          description: ''
  /api/payments/process/:
    post:
      operationId: api_payments_process_create
      description: Processa o pagamento de um pedido utilizando o método de pagamento
        informado.
      summary: Processar pagamento
      tags:
      - Pagamentos
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
          description: ''
  /api/products/:
    get:
      operationId: api_products_list
      description: Retorna uma lista paginada de todos os produtos ativos.
      summary: Listar produtos
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - Produtos
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProductList'
          description: ''
    post:
      operationId: api_products_create
      description: Cria um novo produto com os dados fornecidos.
      summary: Criar novo produto
      tags:
      - Produtos
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProductRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProductRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:

components:
  schemas:
    BestSeller:
      type: object
      properties:
        product_name:
          type: string
        product__id:
          type: integer
        total_sold:
          type: integer
        total_revenue:
          type: number
          format: double
      required:
      - product__id
      - product_name
      - total_revenue
      - total_sold
    Cart:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
          readOnly: true
        total:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - items
      - total
      - updated_at
    CartItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product:
          type: integer
        product_detail:
          allOf:
          - $ref: '#/components/schemas/Product'
          readOnly: true
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 0
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
      required:
      - id
      - product
      - product_detail
      - subtotal
    CartItemRequest:
      type: object
      properties:
        product:
          type: integer
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - product
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
      required:
      - id
      - name
      - slug
    CategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          minLength: 1
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
      required:
      - name
      - slug
    CreateOrderRequest:
      type: object
      properties:
        shipping_address:
          type: string
          minLength: 1
        postal_code:
          type: string
          minLength: 1
        payment_method:
          $ref: '#/components/schemas/PaymentMethodEnum'
      required:
      - payment_method
      - postal_code
      - shipping_address
    Dashboard:
      type: object
      properties:
        total_products:
          type: integer
        total_orders:
          type: integer
        total_customers:
          type: integer
        total_revenue:
          type: number
          format: double
        pending_orders:
          type: integer
        low_stock_items:
          type: integer
      required:
      - low_stock_items
      - pending_orders
      - total_customers
      - total_orders
      - total_products
      - total_revenue
    Login:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
    Message:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        role:
          $ref: '#/components/schemas/MessageRoleEnum'
        content:
          type: string
        tool_name:
          type: string
          nullable: true
          maxLength: 100
        tool_input:
          nullable: true
        tool_output:
          nullable: true
        image:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - role
    MessageRoleEnum:
      enum:
      - user
      - assistant
      - tool
      type: string
      description: |-
        * `user` - Usuário
        * `assistant` - Assistente
        * `tool` - Ferramenta
    MonthlyRevenue:
      type: object
      properties:
        month:
          type: string
        revenue:
          type: number
          format: double
        orders:
          type: integer
      required:
      - month
      - orders
      - revenue
    Order:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/OrderStatusEnum'
          readOnly: true
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        shipping_address:
          type: string
        shipping_cost:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          readOnly: true
        delivery_region:
          type: string
          readOnly: true
        estimated_delivery_date:
          type: string
          format: date
          readOnly: true
          nullable: true
        shipped_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        delivered_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - delivered_at
      - delivery_region
      - estimated_delivery_date
      - id
      - items
      - shipped_at
      - shipping_address
      - shipping_cost
      - status
      - total
      - updated_at
      - user
    OrderItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product:
          type: integer
          nullable: true
        product_name:
          type: string
          maxLength: 200
        product_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 0
        subtotal:
          type: string
          readOnly: true
      required:
      - id
      - product_name
      - product_price
      - quantity
      - subtotal
    OrderItemRequest:
      type: object
      properties:
        product:
          type: integer
          nullable: true
        product_name:
          type: string
          minLength: 1
          maxLength: 200
        product_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - product_name
      - product_price
      - quantity
    OrderRequest:
      type: object
      properties:
        shipping_address:
          type: string
          minLength: 1
      required:
      - shipping_address
    OrderStatus:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
      required:
      - count
      - status
    OrderStatusEnum:
      enum:
      - pending
      - confirmed
      - shipped
      - delivered
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `confirmed` - Confirmed
        * `shipped` - Shipped
        * `delivered` - Delivered
        * `cancelled` - Cancelled
    PaginatedBestSellerList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/BestSeller'
    PaginatedCartList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Cart'
